<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links | Open Source Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <button id="share-btn" class="share-btn" title="Compartilhar página">
            <i class="fa-solid fa-share-nodes"></i>
        </button>

        <header class="profile">
            <img src="https://thumbs.dreamstime.com/b/personagem-bonitinho-de-avatar-cabe%C3%A7a-quadrada-express%C3%A3o-facial-inteligente-do-vetor-caracteres-bonitos-301454571.jpg" alt="Foto de Perfil" class="avatar">
            <h1>Seu Nome</h1>
            <p>Desenvolvedor Full Stack & Criador de Conteúdo</p>
        </header>

        <!-- Caso queira mudar os ÍCONES dos Links, basta localizar "fa-github"
         e alterar para o de sua preferência, como:
         fa-google
         fa-twitter
         fa-instagram-->

        <main class="links-container">
            <a href="https://github.com" target="_blank" class="link-card">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
            <a href="https://linkedin.com" target="_blank" class="link-card">
                <i class="fa-brands fa-linkedin"></i> LinkedIn
            </a>
            <a href="https://youtube.com" target="_blank" class="link-card">
                <i class="fa-brands fa-youtube"></i> YouTube
            </a>
            <a href="mailto:seu-email@email.com" class="link-card">
                <i class="fa-solid fa-envelope"></i> Entre em Contato
            </a>
        </main>

        <footer>
            <p>Criado com ❤️ usando HTML, CSS e JS</p> <br>
            <p>© by RecordioApenas on GitHub</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
